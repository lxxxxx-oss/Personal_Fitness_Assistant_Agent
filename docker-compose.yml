services:
  etcd:
    profiles: ["milvus"]
    container_name: fitness-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    profiles: ["milvus"]
    container_name: fitness-milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    profiles: ["milvus"]
    container_name: fitness-milvus-standalone
    image: milvusdb/milvus:v2.5.27
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  fitness-assistant:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - D:/Users/Agent/model/models/Qwen/Qwen3-0___6B:/models/Qwen3-0.6B:ro
    environment:
      - MODEL_PATH=/models/Qwen3-0.6B
      - MODEL_DEVICE=cpu
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - RETRIEVER_BACKEND=${RETRIEVER_BACKEND:-memory}
      - RETRIEVER_FALLBACK_TO_MEMORY=${RETRIEVER_FALLBACK_TO_MEMORY:-true}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - MILVUS_URI=http://milvus-standalone:19530
      - MILVUS_COLLECTION_NAME=${MILVUS_COLLECTION_NAME:-fitness_knowledge_bge_small_zh_v15}
      - MILVUS_INDEX_TYPE=${MILVUS_INDEX_TYPE:-IVF_FLAT}
      - MILVUS_NLIST=${MILVUS_NLIST:-128}
      - MILVUS_NPROBE=${MILVUS_NPROBE:-16}
    restart: unless-stopped
